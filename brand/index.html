<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>День профийца — Профи.ру</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="logo.png" type="image/png" />
</head>
<body>
  <div class="bg-deco" aria-hidden="true"></div>

  <main class="app">
    <header class="topbar">
      <a class="brand" href="https://profi.ru" target="_blank" rel="noopener" aria-label="Профи.ру">
        <img class="brand-logo" src="logo.png" width="160" height="36" alt="профи.ру" />
      </a>
      <div class="progress-wrap" id="progressWrap" hidden>
        <div class="progress-label"><span id="sceneLabel">Сцена 1</span> · <span id="scoreLabel">0</span></div>
        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </header>

    <section class="stage" id="stage"></section>
  </main>

  <div class="toast" id="toast" hidden></div>
  <script src="game.js"></script>
</body>
</html>
