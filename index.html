<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>День профийца — культура Профи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Sofia+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="sky" aria-hidden="true"></div>
  <div class="blobs" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
  </div>

  <main class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">П</span>
        <span class="brand-text">День профийца</span>
      </div>
      <div class="progress-wrap" id="progressWrap" hidden>
        <div class="progress-label"><span id="sceneLabel">Сцена 1</span> · <span id="scoreLabel">0</span></div>
        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </header>

    <section class="stage" id="stage">
      <!-- filled by JS -->
    </section>
  </main>

  <div class="toast" id="toast" hidden></div>

  <script src="game.js"></script>
</body>
</html>
